<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>女性面接用文字起こし</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: #fff;
      color: #333;
      max-width: 390px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── ヘッダー ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 12px;
    }
    .header-title {
      font-size: 1rem;
      font-weight: 700;
      color: #333;
    }
    .btn-settings {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: #E8849A;
      padding: 4px;
      line-height: 1;
    }

    /* ── タブ ── */
    .tabs {
      display: flex;
      gap: 10px;
      padding: 0 20px 14px;
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      border-radius: 50px;
      border: 1.5px solid #F0D0D8;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: all 0.2s;
      background: #fff;
      color: #ccc;
    }
    .tab.active {
      background: linear-gradient(135deg, #F4A0B5, #E8849A);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 14px rgba(232,132,154,0.35);
    }

    /* ── 設定パネル ── */
    .settings-panel {
      background: #FFF5F7;
      border-top: 1px solid #FCE4EC;
      border-bottom: 1px solid #FCE4EC;
      padding: 14px 20px;
      display: none;
    }
    .settings-panel.open { display: block; }
    .settings-label { font-size: 0.72rem; font-weight: 700; color: #E8849A; letter-spacing: 0.06em; margin-bottom: 8px; }
    .api-row { display: flex; gap: 8px; }
    .api-input {
      flex: 1; padding: 10px 12px;
      border: 1.5px solid #FCE4EC;
      border-radius: 10px; font-size: 0.85rem;
      font-family: monospace; outline: none; background: #fff;
      transition: border-color 0.2s;
    }
    .api-input:focus { border-color: #E8849A; }
    .btn-save {
      padding: 10px 14px;
      background: linear-gradient(135deg, #F4A0B5, #E8849A);
      color: #fff; border: none; border-radius: 10px;
      cursor: pointer; font-size: 0.82rem; font-weight: 700;
    }
    .api-saved { font-size: 0.75rem; color: #E8849A; margin-top: 6px; min-height: 14px; }

    /* ── コンテンツ ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 12px;
      display: flex;
      flex-direction: column;
    }
    .content::-webkit-scrollbar { display: none; }

    /* ── エラー ── */
    .error-wrap {
      background: #FFF5F5;
      border: 1px solid #FECACA;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.82rem; color: #C02020;
      white-space: pre-wrap;
      margin-bottom: 10px;
      display: none;
    }

    /* ── メインカード ── */
    .main-card {
      background: #fff;
      border-radius: 24px;
      border: 1px solid #FCE4EC;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(232,132,154,0.08);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── ヒントセクション ── */
    .hint-section { padding: 20px; }
    .hint-card {
      background: #FFF0F3;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .hint-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
    .hint-text { font-size: 0.85rem; color: #888; line-height: 1.75; }

    /* ── ファイルアップロード ── */
    .upload-card {
      background: #FFF0F3;
      border-radius: 16px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .upload-card:hover { background: #FDEAF0; }
    .upload-card-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .upload-card-text { font-size: 0.85rem; color: #888; line-height: 1.7; }
    .upload-card-hint { font-size: 0.74rem; color: #ccc; margin-top: 4px; }
    .file-chosen { font-size: 0.8rem; color: #E8849A; font-weight: 700; margin-top: 10px; display: none; }

    /* ── プログレス ── */
    .progress-wrap {
      padding: 28px 20px;
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .progress-spinner {
      width: 48px; height: 48px;
      border: 3px solid #FCE4EC;
      border-top-color: #E8849A;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-label { font-size: 0.85rem; color: #E8849A; font-weight: 600; margin-bottom: 14px; }
    .progress-bg { height: 6px; background: #FCE4EC; border-radius: 99px; overflow: hidden; width: 100%; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #F4A0B5, #E8849A); border-radius: 99px; width: 0%; transition: width 0.4s; }

    /* ── 文字起こし結果 ── */
    .transcript-section { padding: 16px 20px; flex: 1; overflow-y: auto; }
    .transcript-section::-webkit-scrollbar { display: none; }
    .transcript-header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid #FCE4EC;
      margin-bottom: 12px;
    }
    .transcript-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; font-weight: 700; color: #E8849A;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #E8849A;
    }
    .status-dot.pulse { animation: dot-blink 1s ease-in-out infinite; }
    @keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .transcript-timer { font-size: 0.78rem; color: #ccc; font-family: monospace; }

    /* 結果タブ */
    .result-tab-bar { display: flex; gap: 6px; margin-bottom: 12px; }
    .rtab {
      padding: 5px 14px; border-radius: 50px;
      border: 1.5px solid #FCE4EC;
      font-size: 0.74rem; font-weight: 700;
      cursor: pointer; background: #fff; color: #E8849A;
      transition: all 0.15s;
    }
    .rtab.active { background: #E8849A; color: #fff; border-color: #E8849A; }

    /* プレインテキスト */
    .plain-text { font-size: 0.88rem; line-height: 1.85; color: #444; }

    /* セグメント（タイムスタンプ付き） */
    .segment { display: flex; gap: 8px; margin-bottom: 14px; align-items: flex-start; }
    .seg-time-tag {
      font-size: 0.7rem; font-weight: 700; padding: 3px 8px;
      border-radius: 50px; white-space: nowrap; flex-shrink: 0;
      margin-top: 2px; background: #FCE4EC; color: #C07080;
      font-family: monospace;
    }
    .seg-text { font-size: 0.85rem; line-height: 1.75; color: #444; }

    /* ── ウェーブフォーム ── */
    .waveform {
      display: none;
      align-items: center; justify-content: center;
      gap: 3px; padding: 14px 20px;
      border-top: 1px solid #FCE4EC;
    }
    .waveform.show { display: flex; }
    .wave-bar {
      width: 3px; border-radius: 99px; background: #F4A0B5;
      animation: wave-anim 1s ease-in-out infinite;
    }
    @keyframes wave-anim {
      0%,100% { height: 3px; opacity: 0.4; }
      50% { height: 18px; opacity: 1; }
    }

    /* ── ボトムバー ── */
    .bottom-bar {
      background: #fff;
      border-top: 1px solid #FCE4EC;
      padding: 10px 0 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 44px;
    }
    .side-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .btn-side {
      width: 46px; height: 46px; border-radius: 50%;
      background: none; border: none; cursor: pointer;
      font-size: 1.3rem; color: #E8849A;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .btn-side:hover { transform: scale(1.1); }
    .btn-side:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .side-label { font-size: 0.7rem; color: #bbb; font-weight: 600; }

    /* マイクボタン */
    .mic-outer {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(244,160,181,0.18);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s;
    }
    .mic-outer.recording { background: rgba(232,68,68,0.15); }
    .btn-mic {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(145deg, #F4B0C0, #E8849A);
      border: none; cursor: pointer; font-size: 1.7rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 18px rgba(232,132,154,0.42);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-mic:hover { transform: scale(1.06); box-shadow: 0 8px 22px rgba(232,132,154,0.52); }
    .btn-mic:active { transform: scale(0.94); }
    .btn-mic.recording {
      background: linear-gradient(145deg, #F08080, #E84050);
      box-shadow: 0 6px 20px rgba(232,64,80,0.45);
      animation: mic-pulse 1.4s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 6px 20px rgba(232,64,80,0.45); }
      50%      { box-shadow: 0 6px 28px rgba(232,64,80,0.70); }
    }

    /* ── トースト ── */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 22px;
      border-radius: 50px; font-size: 0.82rem; font-weight: 600;
      opacity: 0; pointer-events: none; transition: opacity 0.3s; white-space: nowrap;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div class="header">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <circle cx="15" cy="10" r="5.5" stroke="#E8849A" stroke-width="1.8"/>
      <path d="M5.5 27c0-5.247 4.253-9.5 9.5-9.5s9.5 4.253 9.5 9.5" stroke="#E8849A" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <span class="header-title">女性面接用文字起こし</span>
    <button class="btn-settings" id="settingsBtn" onclick="toggleSettings()">⚙️</button>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab active" id="tabRecord" onclick="switchMode('record')">🎙 録音</button>
    <button class="tab" id="tabFile" onclick="switchMode('file')">📁 ファイル</button>
  </div>

  <!-- 設定パネル -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-label">OPENAI API キー</div>
    <div class="api-row">
      <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-..." autocomplete="off" />
      <button class="btn-save" onclick="saveApiKey()">保存</button>
    </div>
    <div class="api-saved" id="apiSaved"></div>
  </div>

  <!-- コンテンツ -->
  <div class="content">

    <!-- エラー -->
    <div class="error-wrap" id="errorWrap"></div>

    <!-- メインカード -->
    <div class="main-card">

      <!-- ヒント（録音前・録音モード） -->
      <div class="hint-section" id="hintSection">
        <div class="hint-card">
          <span class="hint-icon">✨</span>
          <span class="hint-text">面接の録音を開始すると、<br>文字起こし結果がここに表示されます。<br><br><span id="hintApiNote">⚙️ からAPIキーを設定してください。</span></span>
        </div>
      </div>

      <!-- ファイルアップロード（ファイルモード） -->
      <div class="hint-section" id="fileSection" style="display:none">
        <div class="upload-card" id="uploadArea" onclick="document.getElementById('fileInput').click()">
          <div class="upload-card-icon">📁</div>
          <div class="upload-card-text">タップして音声ファイルを選択</div>
          <div class="upload-card-hint">MP3・M4A・WAV・MP4 ／ 最大24MB</div>
        </div>
        <div class="file-chosen" id="fileChosen"></div>
        <input type="file" id="fileInput" accept="audio/*,video/mp4" style="display:none" />
      </div>

      <!-- プログレス -->
      <div id="progressSection" style="display:none">
        <div class="progress-wrap">
          <div class="progress-spinner"></div>
          <div class="progress-label" id="progressLabel">音声を解析中...</div>
          <div class="progress-bg"><div class="progress-fill" id="progressFill"></div></div>
        </div>
      </div>

      <!-- 文字起こし結果 -->
      <div id="transcriptSection" style="display:none">
        <div class="transcript-section">
          <div class="transcript-header">
            <div class="transcript-status">
              <div class="status-dot" id="statusDot"></div>
              <span id="statusLabel">文字起こし結果</span>
            </div>
            <span class="transcript-timer" id="transcriptTimer"></span>
          </div>
          <div class="result-tab-bar">
            <button class="rtab active" onclick="switchResultTab('plain', this)">テキスト</button>
            <button class="rtab" id="rtabTs" onclick="switchResultTab('ts', this)" style="display:none">時刻付き</button>
          </div>
          <div class="plain-text" id="plainText"></div>
          <div id="segmentsView" style="display:none"></div>
        </div>
      </div>

      <!-- ウェーブフォーム（録音中） -->
      <div class="waveform" id="waveform"></div>

    </div>
  </div>

  <!-- ボトムバー -->
  <div class="bottom-bar">
    <div class="side-btn-wrap">
      <button class="btn-side" onclick="openFilePicker()">📁</button>
      <span class="side-label">ファイル</span>
    </div>
    <div>
      <div class="mic-outer" id="micOuter">
        <button class="btn-mic" id="micBtn" onclick="handleMic()">🎙</button>
      </div>
    </div>
    <div class="side-btn-wrap">
      <button class="btn-side" id="copyBtn" onclick="copyResult()" disabled>📋</button>
      <span class="side-label">コピー</span>
    </div>
  </div>

  <div class="toast" id="toast">コピーしました</div>

<script>
  /* ─── 状態 ─── */
  let mode = 'record';
  let hasServerKey = false; // サーバー側にAPIキーがあるか
  let audioBlob = null;
  let mediaRecorder = null;
  let chunks = [];
  let timerInterval = null;
  let elapsedSec = 0;
  let resultData = { text: '', segments: [] };
  let currentResultTab = 'plain';

  /* ─── ウェーブフォーム生成 ─── */
  (function buildWaveform() {
    const wf = document.getElementById('waveform');
    for (let i = 0; i < 28; i++) {
      const bar = document.createElement('div');
      bar.className = 'wave-bar';
      bar.style.animationDelay = (i * 0.06) + 's';
      wf.appendChild(bar);
    }
  })();

  /* ─── 起動時 ─── */
  window.addEventListener('load', async () => {
    switchMode('record');

    // サーバー側にAPIキーがあるか確認
    try {
      const res = await fetch('/api-key-status');
      const data = await res.json();
      hasServerKey = data.has_server_key;
      if (hasServerKey) {
        // サーバー側にキーがある → 設定ボタンと入力欄を非表示
        document.getElementById('settingsBtn').style.display = 'none';
        document.getElementById('hintApiNote').style.display = 'none';
      } else {
        // サーバー側にキーがない → ローカル保存のキーを読み込む
        const saved = localStorage.getItem('openai_api_key');
        if (saved) {
          document.getElementById('apiKeyInput').value = saved;
          document.getElementById('apiSaved').textContent = '✓ 保存済みのキーを読み込みました';
        }
      }
    } catch {
      // ローカル起動時はフォールバック
      const saved = localStorage.getItem('openai_api_key');
      if (saved) {
        document.getElementById('apiKeyInput').value = saved;
      }
    }
  });

  /* ─── 設定 ─── */
  function toggleSettings() {
    document.getElementById('settingsPanel').classList.toggle('open');
  }
  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return;
    localStorage.setItem('openai_api_key', key);
    const el = document.getElementById('apiSaved');
    el.textContent = '✓ 保存しました';
    setTimeout(() => { el.textContent = ''; }, 2000);
  }

  /* ─── モード切替 ─── */
  function switchMode(m) {
    mode = m;
    document.getElementById('tabRecord').classList.toggle('active', m === 'record');
    document.getElementById('tabFile').classList.toggle('active', m === 'file');
    document.getElementById('hintSection').style.display = m === 'record' ? 'block' : 'none';
    document.getElementById('fileSection').style.display = m === 'file' ? 'block' : 'none';
  }

  /* ─── ファイル ─── */
  function openFilePicker() {
    switchMode('file');
    setTimeout(() => document.getElementById('fileInput').click(), 80);
  }
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) setFile(e.target.files[0]);
  });
  document.getElementById('uploadArea').addEventListener('dragover', e => { e.preventDefault(); });
  document.getElementById('uploadArea').addEventListener('drop', e => {
    e.preventDefault();
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });
  function setFile(file) {
    audioBlob = file;
    const el = document.getElementById('fileChosen');
    el.style.display = 'block';
    el.textContent = `📎 ${file.name}  (${(file.size/1024/1024).toFixed(1)} MB)`;
    startTranscribe();
  }

  /* ─── 録音 ─── */
  async function handleMic() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.addEventListener('dataavailable', e => chunks.push(e.data));
      mediaRecorder.addEventListener('stop', () => {
        stream.getTracks().forEach(t => t.stop());
        audioBlob = new Blob(chunks, { type: 'audio/webm' });
        setRecordingUI(false);
        startTranscribe();
      });
      mediaRecorder.start();
      setRecordingUI(true);
    } catch {
      showError('マイクへのアクセスが許可されていません。\nブラウザの設定を確認してください。');
    }
  }

  function setRecordingUI(isRec) {
    document.getElementById('micBtn').classList.toggle('recording', isRec);
    document.getElementById('micOuter').classList.toggle('recording', isRec);
    document.getElementById('micBtn').textContent = isRec ? '⏹' : '🎙';
    document.getElementById('waveform').classList.toggle('show', isRec);
    document.getElementById('hintSection').style.display = isRec ? 'none' : (mode === 'record' ? 'block' : 'none');

    if (isRec) {
      elapsedSec = 0;
      timerInterval = setInterval(() => {
        elapsedSec++;
        const m = String(Math.floor(elapsedSec / 60)).padStart(2, '0');
        const s = String(elapsedSec % 60).padStart(2, '0');
        document.getElementById('transcriptTimer').textContent = `${m}:${s}`;
      }, 1000);
      document.getElementById('transcriptSection').style.display = 'none';
    } else {
      clearInterval(timerInterval);
    }
  }

  /* ─── 文字起こし ─── */
  async function startTranscribe() {
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    // サーバー側にキーがある場合はフロントのチェックをスキップ
    if (!hasServerKey && !apiKey) { showError('⚙️ からAPIキーを設定してください'); return; }
    if (!audioBlob) return;

    showError('');
    document.getElementById('transcriptSection').style.display = 'none';
    document.getElementById('hintSection').style.display = 'none';
    document.getElementById('progressSection').style.display = 'block';
    document.getElementById('copyBtn').disabled = true;

    let pct = 0;
    const iv = setInterval(() => {
      pct = Math.min(pct + 1.5, 88);
      document.getElementById('progressFill').style.width = pct + '%';
    }, 400);

    const form = new FormData();
    form.append('api_key', apiKey);
    form.append('language', 'ja');
    const fname = audioBlob instanceof File ? audioBlob.name : 'recording.webm';
    form.append('audio', audioBlob, fname);

    try {
      const res = await fetch('/transcribe', { method: 'POST', body: form });
      clearInterval(iv);
      const data = await res.json();
      document.getElementById('progressSection').style.display = 'none';
      if (!res.ok) { showError(data.error || '不明なエラーが発生しました'); return; }
      showResult(data);
    } catch (err) {
      clearInterval(iv);
      document.getElementById('progressSection').style.display = 'none';
      showError('通信エラー: ' + err.message);
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorWrap');
    el.style.display = msg ? 'block' : 'none';
    el.textContent = msg;
    if (!msg) return;
    document.getElementById('hintSection').style.display = mode === 'record' ? 'block' : 'none';
    document.getElementById('fileSection').style.display = mode === 'file' ? 'block' : 'none';
  }

  function showResult(data) {
    resultData = data;
    const hasTs = data.segments && data.segments.length > 0;
    const elapsed = elapsedSec;
    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');

    document.getElementById('plainText').textContent = data.text;
    document.getElementById('transcriptTimer').textContent = elapsed > 0 ? `${m}:${s}` : '';
    document.getElementById('statusLabel').textContent = '文字起こし結果';
    document.getElementById('statusDot').classList.remove('pulse');
    document.getElementById('rtabTs').style.display = hasTs ? 'inline-block' : 'none';

    if (hasTs) {
      document.getElementById('segmentsView').innerHTML = data.segments.map(seg =>
        `<div class="segment">
          <span class="seg-time-tag">${seg.timestamp}</span>
          <span class="seg-text">${seg.text}</span>
        </div>`
      ).join('');
    }

    switchResultTab('plain', document.querySelector('.rtab'));
    document.getElementById('transcriptSection').style.display = 'block';
    document.getElementById('copyBtn').disabled = false;
  }

  function switchResultTab(tab, el) {
    currentResultTab = tab;
    document.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('plainText').style.display = tab === 'plain' ? 'block' : 'none';
    document.getElementById('segmentsView').style.display = tab === 'ts' ? 'block' : 'none';
  }

  function getResultText() {
    if (currentResultTab === 'ts' && resultData.segments.length) {
      return resultData.segments.map(s => `[${s.timestamp}] ${s.text}`).join('\n');
    }
    return resultData.text;
  }

  function copyResult() {
    navigator.clipboard.writeText(getResultText()).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    });
  }
</script>
</body>
</html>
